# Snippet nginx untuk memasang app di SUB-PATH /laptop-inventory.
# TEMPELKAN blok `location` di bawah ke DALAM server { } yang SUDAH ada
# untuk mtani.demosiapp.com (yang sudah HTTPS). Lalu:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Catatan penting:
#  - Trailing slash pada `proxy_pass .../;` MEMBUANG prefix /laptop-inventory/
#    sehingga Flask menerima /form, /api/submit, dst (cocok dengan route-nya).
#  - X-Forwarded-Prefix memberi tahu Flask (via ProxyFix) bahwa app dipasang
#    di /laptop-inventory, supaya semua link & redirect ikut prefix.

# Redirect /laptop-inventory  ->  /laptop-inventory/ (agar relative path benar)
location = /laptop-inventory {
    return 301 /laptop-inventory/;
}

location /laptop-inventory/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /laptop-inventory;

    # Unduh collector & export XLSX bisa beberapa MB.
    client_max_body_size 16m;
}
